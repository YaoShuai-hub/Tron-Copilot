# Trident MCP config (TOML)

# Server port
port = 8787

# API endpoints (Nile testnet by default for hackathon demos)
tronscan_base = "https://nileapi.tronscan.org/api"
trongrid_base = "https://nile.trongrid.io"

# TronGrid / TronScan API Keys (set via environment in production)
# Keep empty in repo to avoid leaking secrets.
#tronscan_api_key = ""
#trongrid_api_key = ""
tronscan_api_key = "1722e8d8-b07a-44e7-8900-8e78db77d373"
trongrid_api_key = "132598a9-92c3-49d0-8ef2-2abc42a92d25"


# USDT contract (TRC20)
usdt_contract = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"

# CoinGecko base (pricing for portfolio total)
coingecko_base = "https://api.coingecko.com/api/v3"

# Request timeout (seconds)
request_timeout = 1200

# Logging
log_level = "INFO"        # DEBUG/INFO/WARNING/ERROR
log_file = "logs/trident.log"             # empty => console only
# Safety / humanization
safety_enable = true      # add human-readable annotations to tool outputs

# AI provider (optional, for LLM-driven tool orchestration)
ai_api_base = "https://ark.cn-beijing.volces.com/api/v3"
#ai_api_key = "<set-via-env>"
#ai_model = "doubao-seed-1-8-251228"
ai_api_key = "c8fa0fe0-1e34-4f2e-b177-5faf1dea0100"
ai_model = "glm-4-7-251222"
#ai_api_base = "https://api.deepseek.com/v1"
#ai_api_key = "sk-1afd019acba54287856b9008e0347473"
#ai_model = "deepseek-chat"
ai_provider = "openai"   # openai | azure-openai | anthropic | custom

# Telegram (optional)
telegram_bot_token = ""
telegram_chat_id = ""
telegram_subscribers_path = "logs/telegram_subscribers.json"

# Audit log directory
audit_log_dir = "logs/transactions"

# Market data base (public REST)
market_data_base = "https://data-api.binance.vision"

# Exchange (optional, via CCXT)
exchange_id = ""
exchange_api_key = ""
exchange_secret = ""
exchange_password = ""
exchange_api_domain = ""
exchange_proxy = ""
risk_rules_path = "risk_rules.json"
